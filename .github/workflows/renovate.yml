name: Renovate
on:
  workflow_dispatch:
    inputs:
      dry_run:
        type: boolean
        default: false
        description: "If true, the Renovate will not make any changes to the repository."
        required: false
  schedule:
    # Runs every 30 minutes
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: "*/30 * * * *"
  pull_request:
    branches:
      - main

env:
  LOG_LEVEL: debug
  # renovate: datasource=docker depName=renovate packageName=ghcr.io/renovatebot/renovate
  RENOVATE_VERSION: 43.158.3-full
  RENOVATE_DRY_RUN: ""
  RENOVATE_ONBOARDING: "false"
  RENOVATE_REQUIRE_CONFIG: "optional"
  RENOVATE_PRINT_CONFIG: ${{ inputs.dry_run }}
  RENOVATE_AUTODISCOVER: "true"

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      # https://github.com/actions/checkout
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Decode the GitHub App Private Key
        id: decode
        shell: bash
        working-directory: ${{ runner.temp }}
        # Skip decode if -----BEGIN is detected in the body of the private key, which indicates that the key is not base64 encoded.
        # This allows users to use either raw or base64 encoded keys without needing to specify which format they are using.
        # Raw secrets are automatically masked by GitHub; the base64-decoded derivative is not, so we mask it explicitly.
        env:
          SECRET_VALUE: ${{ secrets.RENOVATE_APP_PRIVATE_KEY || secrets.PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$SECRET_VALUE" ]]; then
            echo "::error::RENOVATE_APP_PRIVATE_KEY secret is not set"
            exit 1
          fi
          if [[ "$SECRET_VALUE" == *"-----BEGIN"* ]]; then
            echo "Detected unencoded private key, skipping base64 decode"
            private_key="$SECRET_VALUE"
          else
            if ! private_key=$(echo "$SECRET_VALUE" | base64 -d); then
              echo "::error::Failed to base64 decode RENOVATE_APP_PRIVATE_KEY. Verify the secret is valid base64."
              exit 1
            fi
            while IFS= read -r line; do
              [[ -n "$line" ]] && echo "::add-mask::$line"
            done <<< "$private_key"
          fi
          if [[ "$private_key" != *"-----BEGIN"* ]]; then
            echo "::error::Decoded private key does not look like a PEM key (missing -----BEGIN header). Check secret encoding."
            exit 1
          fi
          # Random delimiter prevents injection via crafted secret values
          delimiter="pk_$(head -c 16 /dev/urandom | od -An -tx1 | tr -d ' \n')"
          {
            echo "private-key<<${delimiter}"
            echo "$private_key"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      # https://github.com/actions/create-github-app-token
      - name: Generate GitHub App installation token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        id: app-token
        with:
          app-id: ${{ vars.RENOVATE_APP_ID || vars.APP_ID }}
          private-key: ${{ steps.decode.outputs.private-key }}
          owner: ${{ github.repository_owner }}

      - name: Enable dry-run
        run: echo "RENOVATE_DRY_RUN=full" >> "${GITHUB_ENV}"
        if: inputs.dry_run || github.event_name == 'pull_request'

      # https://github.com/renovatebot/github-action
      - uses: renovatebot/github-action@f66d8679fcfcfa051abde6e7a623007173bf5164 # v46.1.12
        with:
          # https://docs.renovatebot.com/self-hosted-configuration
          configurationFile: default.json
          token: ${{ steps.app-token.outputs.token }}
          renovate-version: ${{ env.RENOVATE_VERSION }}
        env:
          RENOVATE_DRY_RUN: ${{ env.RENOVATE_DRY_RUN }}
